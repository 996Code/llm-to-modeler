services:
  backend:
    build: ./backend
    ports:
      - "18080:8000"
    env_file: .env
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "13080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
